<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hygiene Pass Test Practice</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
            line-height: 1.5;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        
        header {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .back-btn {
            color: #0d9488;
            text-decoration: none;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .header-title {
            font-size: 28px;
            font-weight: 700;
            color: #111827;
            margin-left: auto;
            margin-right: auto;
        }
        
        .claim-header {
            margin: 30px 0 10px;
            font-size: 32px;
            font-weight: 700;
            color: #111827;
        }
        
        .progress-bar {
            height: 4px;
            background: linear-gradient(to right, #0d9488, #14b8a6);
            margin: 10px 0 25px;
            border-radius: 2px;
        }
        
        .question-text {
            font-size: 20px;
            line-height: 1.4;
            margin-bottom: 40px;
            color: #374151;
        }
        
        .options {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .option-btn {
            flex: 1;
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .option-btn:hover {
            border-color: #0d9488;
        }
        
        .option-btn.true {
            background: #ecfdf5;
            border-color: #10b981;
            color: #065f46;
        }
        
        .option-btn.false {
            background: #fef2f2;
            border-color: #ef4444;
            color: #991b1b;
        }
        
        .feedback {
            display: none;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        
        .feedback.correct {
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #10b981;
        }
        
        .feedback.incorrect {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }
        
        .confirm-btn {
            background: #0d9488;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 9999px;
            width: 100%;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }
        
        .confirm-btn:hover {
            background: #0f766e;
        }
        
        .score {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 12px 20px;
            border-radius: 9999px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            font-weight: 600;
            font-size: 18px;
            color: #0d9488;
        }
        
        .results {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        
        .results h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }
        
        .pass {
            color: #10b981;
        }
        
        .fail {
            color: #ef4444;
        }
        
        .next-btn {
            background: #0d9488;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 9999px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <a href="#" class="back-btn" onclick="restartTest()">← Back</a>
            <div class="header-title">Hygiene Pass Test Practice</div>
        </header>

        <!-- Progress -->
        <div id="progress-container">
            <div class="claim-header">Claim <span id="claim-number">1</span></div>
            <div class="progress-bar" style="width: 0%"></div>
        </div>

        <!-- Score -->
        <div class="score">
            Score: <span id="current-score">0</span>/40
        </div>

        <!-- Question -->
        <div id="question-screen">
            <div class="question-text" id="question-text">
                Loading question...
            </div>
            
            <div class="options">
                <button class="option-btn" id="true-btn" onclick="selectAnswer(true)">TRUE</button>
                <button class="option-btn" id="false-btn" onclick="selectAnswer(false)">FALSE</button>
            </div>
            
            <button class="confirm-btn" id="confirm-btn" onclick="submitAnswer()" disabled>Confirm my answer →</button>
        </div>

        <!-- Feedback -->
        <div id="feedback" class="feedback">
            <div id="feedback-title" style="font-weight: 600; margin-bottom: 10px;"></div>
            <div id="explanation"></div>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()" style="margin-top: 20px;">Next question →</button>
        </div>

        <!-- Results -->
        <div id="results-screen" class="results">
            <h1 id="result-title">Test Complete!</h1>
            <p style="font-size: 64px; font-weight: 700; margin: 20px 0;" id="final-score">0/40</p>
            <p id="result-message" style="font-size: 22px; margin-bottom: 30px;"></p>
            
            <button onclick="restartTest()" class="next-btn" style="width: 280px; padding: 18px; font-size: 20px;">Restart Test</button>
        </div>
    </div>

    <script>
        // Questions data (40 questions)
        const questions = [
            {
                id: 1,
                text: "Restaurants must have an own-check plan.",
                answer: true,
                explanation: "All workplaces in the food industry need to ensure the safety of their products with an own-check plan. Own-check plans are required in all food industry workplaces."
            },
            {
                id: 2,
                text: "Taking samples from prepared food products is a part of the own-check plan.",
                answer: true,
                explanation: "Samples must be taken of served food products for example from lunch servings so that they can be stored for possible food poisoning cases."
            },
            {
                id: 3,
                text: "Only old cold storage equipment must have a thermometer.",
                answer: false,
                explanation: "All cold storage equipment in food production areas must have a thermometer."
            },
            {
                id: 4,
                text: "Chopping vegetables improves their shelf life.",
                answer: false,
                explanation: "Whole vegetables keep better than chopped vegetables. Handling food products impairs their shelf life."
            },
            {
                id: 5,
                text: "Disinfecting reduces the amount of microbes from work surfaces and equipment.",
                answer: true,
                explanation: "Correctly done disinfection reduces the amount of microbes excellently on work surfaces and equipment."
            },
            // Add more from documents (I will select 40 representative ones)
            {
                id: 6,
                text: "Fresh fish and roe must be stored between 0 and 2 degrees Celsius.",
                answer: true,
                explanation: "Fresh fish and roe are very easily perishable food products which must be stored close to the temperature of melting ice."
            },
            {
                id: 7,
                text: "Cold storage units should not be filled beyond their set fill limits.",
                answer: true,
                explanation: "The fill limit is an instruction on usage by the producer of the cold storage unit."
            },
            {
                id: 8,
                text: "Additives may be used in all food products.",
                answer: false,
                explanation: "Only approved additives can be used in the preparation of food products."
            },
            {
                id: 9,
                text: "It's not necessary to check the receiving goods before storing if we trust the supplier.",
                answer: false,
                explanation: "To prevent pests, incoming goods must be checked before entering warehouses."
            },
            {
                id: 10,
                text: "Working areas and equipment must always be cleaned by using plenty of water.",
                answer: true,
                explanation: "Water is an important part of cleaning and washing."
            },
            {
                id: 11,
                text: "The own-check plan must include cleaning instructions that are up-to-date.",
                answer: true,
                explanation: "Cleaning instructions must be available and known to the personnel."
            },
            {
                id: 12,
                text: "Visually clean work surfaces guarantee their microbiological cleanliness.",
                answer: false,
                explanation: "Microbiological cleanliness cannot be guaranteed by visual inspection only."
            },
            {
                id: 13,
                text: "Some toxins produced by moulds in food will withstand heating.",
                answer: true,
                explanation: "Mould toxins can withstand much higher temperatures than the mould itself."
            },
            {
                id: 14,
                text: "The amount of water a product contains does not significantly affect its lastingness.",
                answer: false,
                explanation: "Harmful microbes need water to reproduce. Dry products last well."
            },
            {
                id: 15,
                text: "Blanching can be used to improve the lastingness of chopped vegetables during freezing.",
                answer: true,
                explanation: "Blanching stops frozen vegetables' enzymic activity."
            },
            {
                id: 16,
                text: "Liquid soap is to be used when washing the hands.",
                answer: true,
                explanation: "Liquid soap is hygienic."
            },
            {
                id: 17,
                text: "Chefs can use their work shoes during their travel to and from their workplace.",
                answer: false,
                explanation: "Work shoes must not be worn outside the workplace."
            },
            {
                id: 18,
                text: "When frozen vegetables are thawed at room temperature, the number of harmful microbes increases rapidly.",
                answer: true,
                explanation: "Thawing at room temperature increases microbial growth risk."
            },
            {
                id: 19,
                text: "If a fish is dropped on a freshly washed floor, it can still be cooked if heated well.",
                answer: false,
                explanation: "A fish that has fallen onto the floor must never be used."
            },
            {
                id: 20,
                text: "A cheese roll packed in a tight plastic wrap is protected from microbes.",
                answer: false,
                explanation: "It must also be kept in correct storage and serving temperatures."
            },
            {
                id: 21,
                text: "HACCP is a food poisoning causing bacteria.",
                answer: false,
                explanation: "HACCP stands for Hazard Analysis and Critical Control Points."
            },
            {
                id: 22,
                text: "The temperature monitoring of cold storages is a part of own-check plans.",
                answer: true,
                explanation: "Cold storages must always have thermometers."
            },
            {
                id: 23,
                text: "The monitoring logs must be stored at the workplace for 6 months.",
                answer: false,
                explanation: "Logs must be stored for 1 year."
            },
            {
                id: 24,
                text: "The own-check plan of a food production area is not done by a municipality health inspector.",
                answer: true,
                explanation: "Workplaces must create their own own-check plan."
            },
            {
                id: 25,
                text: "Using own-check plans takes a lot of time and resources.",
                answer: false,
                explanation: "Well-planned own-check plans save time and resources."
            },
            {
                id: 26,
                text: "Employees are free to decide who is responsible for the own-check plan at the beginning of each shift.",
                answer: false,
                explanation: "Designated trained persons are responsible."
            },
            {
                id: 27,
                text: "The own-check plan has been created to make it easier for health officials to do their job.",
                answer: false,
                explanation: "Own-check plans emphasize the actor's own responsibility."
            },
            {
                id: 28,
                text: "Own-check plans must also include e.g. cleaning and waste disposal procedures.",
                answer: true,
                explanation: "Own-check plans must consider hygiene, cleaning, etc."
            },
            {
                id: 29,
                text: "Health inspectors inspect restaurant kitchens.",
                answer: true,
                explanation: "Health inspectors make inspections in food production areas."
            },
            {
                id: 30,
                text: "Chefs are required to have a hygiene proficiency passport even if their employment is not permanent.",
                answer: true,
                explanation: "Chefs must pass a hygiene proficiency test."
            },
            {
                id: 31,
                text: "The results in Oiva-reports are not allowed to be read by customers.",
                answer: false,
                explanation: "Oiva-reports are published documents."
            },
            {
                id: 32,
                text: "Temperature measurements stated in own-check plans do not have to be made when one is busy.",
                answer: false,
                explanation: "Only regularly done measurements can prove adherence."
            },
            {
                id: 33,
                text: "The own-check system involves monitoring how quickly food products cool down to storage temperature.",
                answer: true,
                explanation: "Monitoring temperatures is important."
            },
            {
                id: 34,
                text: "Food production employees are free to decide who is responsible for own-check at each shift.",
                answer: false,
                explanation: "Designated persons are responsible."
            },
            {
                id: 35,
                text: "Chefs are allowed to handle money and prepare food without washing hands.",
                answer: false,
                explanation: "Hands must be washed after handling money."
            },
            {
                id: 36,
                text: "Food product employees are required to have good personal hygiene.",
                answer: true,
                explanation: "Good personal hygiene is required."
            },
            {
                id: 37,
                text: "Wooden utensils are well suited for professional kitchens.",
                answer: false,
                explanation: "Wooden utensils are hygiene hazards."
            },
            {
                id: 38,
                text: "Detergents must always be stored in their original packages.",
                answer: true,
                explanation: "Original packages ensure correct use."
            },
            {
                id: 39,
                text: "Kitchen cloths can include lots of microbes even if visually clean.",
                answer: true,
                explanation: "Cloths are often wet and contain waste."
            },
            {
                id: 40,
                text: "A cleaning and washing program must be included in the own-check plan.",
                answer: true,
                explanation: "Cleaning instructions are required."
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let selectedAnswer = null;
        let answered = false;

        function renderQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('claim-number').textContent = q.id;
            document.getElementById('question-text').textContent = q.text;
            
            // Reset buttons
            document.getElementById('true-btn').classList.remove('true', 'false');
            document.getElementById('false-btn').classList.remove('true', 'false');
            document.getElementById('confirm-btn').disabled = true;
            selectedAnswer = null;
            answered = false;
            
            // Update progress
            const progress = ((currentQuestionIndex) / questions.length) * 100;
            document.querySelector('.progress-bar').style.width = `${progress}%`;
        }

        function selectAnswer(isTrue) {
            if (answered) return;
            
            selectedAnswer = isTrue;
            
            const trueBtn = document.getElementById('true-btn');
            const falseBtn = document.getElementById('false-btn');
            
            trueBtn.classList.remove('true', 'false');
            falseBtn.classList.remove('true', 'false');
            
            if (isTrue) {
                trueBtn.classList.add('true');
            } else {
                falseBtn.classList.add('false');
            }
            
            document.getElementById('confirm-btn').disabled = false;
        }

        function submitAnswer() {
            if (selectedAnswer === null || answered) return;
            
            answered = true;
            const q = questions[currentQuestionIndex];
            const isCorrect = selectedAnswer === q.answer;
            
            if (isCorrect) {
                score++;
            }
            
            document.getElementById('current-score').textContent = score;
            
            // Show feedback
            const feedbackEl = document.getElementById('feedback');
            feedbackEl.style.display = 'block';
            document.getElementById('question-screen').style.display = 'none';
            
            const titleEl = document.getElementById('feedback-title');
            if (isCorrect) {
                feedbackEl.className = 'feedback correct';
                titleEl.innerHTML = '✅ Correct (your answer)';
            } else {
                feedbackEl.className = 'feedback incorrect';
                titleEl.innerHTML = `❌ Incorrect (your answer) <span style="color:#10b981">Correct</span>`;
            }
            
            document.getElementById('explanation').innerHTML = `<strong>Explanation for the claim:</strong><br>${q.explanation}`;
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex >= questions.length) {
                showResults();
                return;
            }
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('question-screen').style.display = 'block';
            renderQuestion();
        }

        function showResults() {
            document.getElementById('question-screen').style.display = 'none';
            document.getElementById('feedback').style.display = 'none';
            const resultsScreen = document.getElementById('results-screen');
            resultsScreen.style.display = 'block';
            
            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('final-score').textContent = `\( {score}/ \){questions.length}`;
            
            const titleEl = document.getElementById('result-title');
            const msgEl = document.getElementById('result-message');
            
            if (score >= 34) {
                titleEl.innerHTML = `🎉 <span class="pass">You passed!</span>`;
                msgEl.textContent = `Congratulations! You scored ${percentage}%. You have passed the Hygiene Pass practice test.`;
            } else {
                titleEl.innerHTML = `😔 You didn't pass`;
                msgEl.textContent = `You scored ${percentage}%. You need at least 34 correct answers to pass. Try again!`;
            }
        }

        function restartTest() {
            currentQuestionIndex = 0;
            score = 0;
            document.getElementById('current-score').textContent = '0';
            document.getElementById('results-screen').style.display = 'none';
            document.getElementById('question-screen').style.display = 'block';
            renderQuestion();
        }

        // Initialize
        window.onload = function() {
            renderQuestion();
        };
    </script>
</body>
</html>
